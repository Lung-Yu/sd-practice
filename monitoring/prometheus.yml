global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # notification_system — app exposes /metrics via prometheus-client
  - job_name: notification_service
    static_configs:
      - targets: ["notification-api:8000"]
    metrics_path: /metrics

  # qr_code_generator — app instances expose /metrics
  - job_name: qr_code_app
    static_configs:
      - targets: ["app1:8000", "app2:8000", "app3:8000", "app4:8000"]
    metrics_path: /metrics
