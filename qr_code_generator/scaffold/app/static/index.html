<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 3rem 1rem; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 2rem; width: 100%; max-width: 480px; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #111; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .4rem; color: #444; }
    input[type="url"] {
      width: 100%; padding: .65rem .9rem; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: .95rem; outline: none; transition: border-color .15s;
    }
    input[type="url"]:focus { border-color: #6366f1; }
    button {
      margin-top: 1rem; width: 100%; padding: .7rem; background: #6366f1; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background .15s;
    }
    button:hover { background: #4f46e5; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    #error { margin-top: .75rem; color: #dc2626; font-size: .875rem; display: none; }
    #result { margin-top: 1.5rem; display: none; }
    #qrcode { display: flex; justify-content: center; margin: 1rem 0; }
    #qrcode canvas, #qrcode img { border-radius: 8px; border: 1px solid #e5e7eb; }
    .meta { font-size: .82rem; color: #555; line-height: 1.7; }
    .meta a { color: #6366f1; word-break: break-all; }
    .token-badge {
      display: inline-block; background: #ede9fe; color: #5b21b6;
      border-radius: 6px; padding: .15rem .5rem; font-family: monospace; font-size: .9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>QR Code Generator</h1>
    <label for="urlInput">Long URL</label>
    <input type="url" id="urlInput" placeholder="https://example.com/very/long/path" />
    <button id="generateBtn" onclick="generate()">Generate QR Code</button>
    <div id="error"></div>
    <div id="result">
      <div id="qrcode"></div>
      <div class="meta">
        <div>Token: <span id="tokenBadge" class="token-badge"></span></div>
        <div>Short URL: <a id="shortUrlLink" href="#" target="_blank"></a></div>
        <div>Original: <a id="originalUrlLink" href="#" target="_blank"></a></div>
      </div>
    </div>
  </div>

  <script>
    async function generate() {
      const btn = document.getElementById('generateBtn');
      const errEl = document.getElementById('error');
      const resultEl = document.getElementById('result');
      const url = document.getElementById('urlInput').value.trim();

      errEl.style.display = 'none';
      resultEl.style.display = 'none';
      document.getElementById('qrcode').innerHTML = '';

      if (!url) { showError('Please enter a URL.'); return; }

      btn.disabled = true;
      btn.textContent = 'Generating…';

      try {
        const res = await fetch('/api/qr/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        if (!res.ok) { showError(data.detail || 'Server error'); return; }

        document.getElementById('tokenBadge').textContent = data.token;
        const shortLink = document.getElementById('shortUrlLink');
        shortLink.href = data.short_url;
        shortLink.textContent = data.short_url;
        const origLink = document.getElementById('originalUrlLink');
        origLink.href = data.original_url;
        origLink.textContent = data.original_url;

        new QRCode(document.getElementById('qrcode'), {
          text: data.short_url,
          width: 220,
          height: 220,
          colorDark: '#111827',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });

        resultEl.style.display = 'block';
      } catch (e) {
        showError('Network error: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate QR Code';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') generate();
    });
  </script>
</body>
</html>
