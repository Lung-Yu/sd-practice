services:
  postgres:
    image: docker.io/postgres:16-alpine
    command: >
      postgres
      -c synchronous_commit=off
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c shared_buffers=256MB
      -c wal_level=replica
      -c max_wal_senders=3
    environment:
      POSTGRES_DB: qrcode
      POSTGRES_USER: qruser
      POSTGRES_PASSWORD: qrpass
    ports:
      - "5532:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qruser -d qrcode"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: docker.io/redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6479:6379"
    volumes:
      - redis_data:/data

  postgres_replica:
    image: docker.io/postgres:16-alpine
    user: postgres
    environment:
      PGDATA: /var/lib/postgresql/data
      PGPASSWORD: replicatorpass
    entrypoint: ["/bin/sh", "/scripts/replica_entrypoint.sh"]
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
      - ./postgres/replica_entrypoint.sh:/scripts/replica_entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qruser -d qrcode"]
      interval: 5s
      timeout: 3s
      retries: 15

  pgbouncer:
    image: docker.io/edoburu/pgbouncer:latest
    environment:
      - DB_USER=qruser
      - DB_PASSWORD=qrpass
      - DB_HOST=postgres
      - DB_NAME=qrcode
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=2000
      - DEFAULT_POOL_SIZE=40
      - SERVER_RESET_QUERY=DISCARD ALL
      - AUTH_TYPE=scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy

  app1:
    build: ./scaffold
    environment:
      - DATABASE_URL=postgresql+asyncpg://qruser:qrpass@pgbouncer:5432/qrcode
      - READ_DATABASE_URL=postgresql+asyncpg://qruser:qrpass@postgres_replica:5432/qrcode
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      pgbouncer:
        condition: service_started

  app2:
    build: ./scaffold
    environment:
      - DATABASE_URL=postgresql+asyncpg://qruser:qrpass@pgbouncer:5432/qrcode
      - READ_DATABASE_URL=postgresql+asyncpg://qruser:qrpass@postgres_replica:5432/qrcode
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      pgbouncer:
        condition: service_started

  app3:
    build: ./scaffold
    environment:
      - DATABASE_URL=postgresql+asyncpg://qruser:qrpass@pgbouncer:5432/qrcode
      - READ_DATABASE_URL=postgresql+asyncpg://qruser:qrpass@postgres_replica:5432/qrcode
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      pgbouncer:
        condition: service_started

  app4:
    build: ./scaffold
    environment:
      - DATABASE_URL=postgresql+asyncpg://qruser:qrpass@pgbouncer:5432/qrcode
      - READ_DATABASE_URL=postgresql+asyncpg://qruser:qrpass@postgres_replica:5432/qrcode
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      pgbouncer:
        condition: service_started

  nginx-site1:
    image: docker.io/nginx:alpine
    volumes:
      - ./nginx/nginx-site1.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  nginx-site2:
    image: docker.io/nginx:alpine
    volumes:
      - ./nginx/nginx-site2.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app3
      - app4

  nginx-global:
    image: docker.io/nginx:alpine
    ports:
      - "8100:80"
    volumes:
      - ./nginx/nginx-global.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nginx-site1
      - nginx-site2

  prometheus:
    image: docker.io/prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9190:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: docker.io/grafana/grafana:latest
    ports:
      - "3100:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  pg_data:
  grafana_data:
  redis_data:
  pg_replica_data:
