global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # notification_system — API workers expose request-level metrics
  - job_name: notification_service
    static_configs:
      - targets: ["notification-api:8000"]
    metrics_path: /metrics

  # notification_system — delivery worker exposes delivery-side metrics
  # (notifications_sent_total, delivery_duration, circuit_breaker_trips, etc.)
  - job_name: delivery_worker
    static_configs:
      - targets: ["delivery-worker:8001"]
    metrics_path: /metrics

  # qr_code_generator — app instances expose /metrics
  - job_name: qr_code_app
    static_configs:
      - targets: ["app1:8000", "app2:8000", "app3:8000", "app4:8000"]
    metrics_path: /metrics
