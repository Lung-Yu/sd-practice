# Notification Service — nginx reverse proxy / load balancer
#
# Upstream uses the service name from docker-compose.
# When multiple notification-api replicas are running
# (podman-compose up --scale notification-api=N), the internal
# DNS round-robins across them; each nginx worker maintains
# a keepalive pool to the backends.

upstream notification_api {
    server notification-api:8000;
    keepalive 64;          # reuse TCP connections to backends
    keepalive_requests 1000;
    keepalive_time 1m;
}

server {
    listen 80;

    # Propagate real client IP to the app.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    # Use HTTP/1.1 on the upstream side so keepalive works.
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    proxy_connect_timeout  3s;
    proxy_read_timeout    30s;
    proxy_send_timeout    10s;

    # Buffer tuning — small responses, avoid disk buffering.
    proxy_buffering       on;
    proxy_buffer_size     8k;
    proxy_buffers         8 8k;

    location / {
        proxy_pass http://notification_api;
    }

    # Lightweight health check used by monitoring / readiness probes.
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
