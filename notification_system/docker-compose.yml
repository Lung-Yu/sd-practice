version: "3.9"

# Shared monitoring network — start root docker-compose.monitoring.yml first.
# The network is auto-created by scripts/start.sh if monitoring isn't running.
networks:
  sd_monitoring:
    name: sd_monitoring
    external: true

volumes:
  redis_data:
  redis_delivery_data:

services:
  # Primary Redis — notification state: HASH, idempotency STRING, user ZSET, rate-limit counters
  redis:
    image: redis:7-alpine
    networks:
      - sd_monitoring
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis_data:/data

  # Delivery Redis (Tier 7) — Stream + DLQ only; isolated from API state workload.
  # When DELIVERY_REDIS_URL is not set the app falls back to REDIS_URL (single-Redis mode).
  redis-delivery:
    image: redis:7-alpine
    networks:
      - sd_monitoring
    command: redis-server --appendonly yes
    volumes:
      - redis_delivery_data:/data

  notification-api:
    build: .
    networks:
      - sd_monitoring
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FAILURE_RATE=${FAILURE_RATE:-0.20}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - REDIS_URL=redis://redis:6379/0
      - DELIVERY_REDIS_URL=redis://redis-delivery:6379/0
    depends_on:
      - redis
      - redis-delivery

  delivery-worker:
    build: .
    networks:
      - sd_monitoring
    # No host port binding — multiple worker instances can't share the same host
    # port. Prometheus scrapes via sd_monitoring network (delivery-worker:8001).
    # For scaled deployments, Prometheus DNS round-robins across instances.
    env_file:
      - .env
    environment:
      - FAILURE_RATE=${FAILURE_RATE:-0.20}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - REDIS_URL=redis://redis:6379/0
      - DELIVERY_REDIS_URL=redis://redis-delivery:6379/0
      - WORKER_BATCH_SIZE=${WORKER_BATCH_SIZE:-20}
    command: ["python", "-m", "app.worker"]
    depends_on:
      - redis
      - redis-delivery

  # nginx — load balancer / reverse proxy in front of notification-api replicas.
  # Dev:      1 API instance, accessed via :8080 (nginx) or :8000 (direct)
  # Scaled:   podman-compose up --scale notification-api=4
  #           nginx round-robins across replicas via DNS
  nginx:
    image: nginx:1.27-alpine
    networks:
      - sd_monitoring
    ports:
      - "8080:80"
    volumes:
      - ./nginx/notification.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - notification-api
