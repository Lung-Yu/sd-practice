version: "3.9"

# Shared monitoring network — start root docker-compose.monitoring.yml first.
# The network is auto-created by scripts/start.sh if monitoring isn't running.
networks:
  sd_monitoring:
    name: sd_monitoring
    external: true

volumes:
  redis_data:

services:
  redis:
    image: redis:7-alpine
    networks:
      - sd_monitoring
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis_data:/data

  notification-api:
    build: .
    networks:
      - sd_monitoring
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FAILURE_RATE=${FAILURE_RATE:-0.20}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  delivery-worker:
    build: .
    networks:
      - sd_monitoring
    env_file:
      - .env
    environment:
      - FAILURE_RATE=${FAILURE_RATE:-0.20}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - REDIS_URL=redis://redis:6379/0
    command: ["python", "-m", "app.worker"]
    depends_on:
      - redis
