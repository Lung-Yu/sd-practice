worker_processes 4;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    # Rate limit zone：按來源 IP 計算，10 MB 記憶體可記錄 ~160,000 個 IP
    limit_req_zone $binary_remote_addr zone=create_zone:10m rate=20r/s;

    upstream qr_app {
        server app1:8000;
        server app2:8000;
        server app3:8000;
        server app4:8000;
        keepalive 256;
        keepalive_requests 1000;
        keepalive_timeout  65s;
    }

    server {
        listen 80;

        # create endpoint：獨立 location，套用 rate limit
        location = /api/qr/create {
            limit_req zone=create_zone burst=40 nodelay;
            limit_req_status 429;
            proxy_pass         http://qr_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # 其他所有路由（redirect、analytics、等）不限速
        location / {
            proxy_pass         http://qr_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }
}
