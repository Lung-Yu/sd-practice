# 4-replica load balancer config — used with docker-compose.nginx-scale.yml
upstream notification_api {
    least_conn;
    server notification-api-1:8000;
    server notification-api-2:8000;
    server notification-api-3:8000;
    server notification-api-4:8000;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_time 1m;
}

server {
    listen 80;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    proxy_connect_timeout  3s;
    proxy_read_timeout    30s;
    proxy_send_timeout    10s;

    proxy_buffering    on;
    proxy_buffer_size  8k;
    proxy_buffers      8 8k;

    location / {
        proxy_pass http://notification_api;
    }

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
